<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Debug Console</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #c0c0d0;
      font-family: 'Menlo', 'Consolas', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.5;
      padding: 16px;
      min-height: 100vh;
    }
    .container { max-width: 900px; margin: 0 auto; }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2a2a4a;
      padding-bottom: 12px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 16px;
      color: #00ff88;
      font-weight: normal;
    }
    .header h1 span { color: #555; }

    /* Sections */
    .section {
      border: 1px solid #2a2a4a;
      border-radius: 4px;
      margin-bottom: 12px;
      padding: 12px;
    }
    .section-title {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .config-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 24px;
    }
    .config-grid .label { color: #888; }
    .config-grid .value { color: #00ff88; }
    .config-grid .value.off { color: #ff4444; }

    /* Buttons */
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .btn-row-label {
      width: 100%;
      font-size: 11px;
      color: #555;
      margin-top: 4px;
    }
    button {
      background: #2a2a4a;
      color: #c0c0d0;
      border: 1px solid #3a3a5a;
      border-radius: 3px;
      padding: 5px 12px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    button:hover:not(:disabled) {
      background: #3a3a5a;
      border-color: #00ff88;
      color: #fff;
    }
    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    button.loading {
      color: #00ff88;
      border-color: #00ff88;
    }
    button.reset {
      background: #3a2020;
      border-color: #553030;
    }
    button.reset:hover:not(:disabled) {
      background: #553030;
      border-color: #ff4444;
      color: #ff4444;
    }

    /* Standalone row */
    .standalone-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    select {
      background: #2a2a4a;
      color: #c0c0d0;
      border: 1px solid #3a3a5a;
      border-radius: 3px;
      padding: 5px 8px;
      font-family: inherit;
      font-size: 12px;
    }

    /* Output log */
    #output {
      max-height: 60vh;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #3a3a5a #1a1a2e;
    }
    #output::-webkit-scrollbar { width: 6px; }
    #output::-webkit-scrollbar-track { background: #1a1a2e; }
    #output::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 3px; }

    .log-entry {
      border: 1px solid #2a2a4a;
      border-radius: 4px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      background: #22223a;
      cursor: pointer;
      user-select: none;
    }
    .log-header:hover { background: #2a2a4a; }
    .log-title { color: #00ff88; }
    .log-time { color: #888; font-size: 11px; }
    .log-body {
      padding: 8px 10px;
      display: none;
      border-top: 1px solid #2a2a4a;
    }
    .log-entry.open .log-body { display: block; }
    .log-meta {
      color: #888;
      margin-bottom: 6px;
    }
    .log-meta strong { color: #c0c0d0; }
    .log-data {
      white-space: pre-wrap;
      word-break: break-word;
      color: #a0a0c0;
      font-size: 12px;
    }
    .log-error .log-header { border-left: 3px solid #ff4444; }
    .log-error .log-title { color: #ff4444; }
    .log-validation {
      margin-top: 6px;
      padding: 4px 8px;
      border-radius: 3px;
      font-size: 12px;
    }
    .log-validation.valid { background: #1a3a1a; color: #00ff88; }
    .log-validation.invalid { background: #3a1a1a; color: #ff4444; }
    .score-bar {
      display: inline-block;
      background: #2a2a4a;
      border-radius: 2px;
      padding: 1px 6px;
      margin-right: 4px;
      font-size: 11px;
    }
    .score-bar.high { color: #00ff88; }
    .score-bar.mid { color: #ffaa00; }
    .score-bar.low { color: #ff4444; }
    .empty-state {
      text-align: center;
      color: #444;
      padding: 40px;
      font-style: italic;
    }
    /* Dialog rendering */
    .dialog-section-title {
      display: block;
      font-size: 11px;
      color: #00ff88;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
      border-bottom: 1px solid #2a2a4a;
      padding-bottom: 2px;
    }
    .dialog-phase {
      margin-bottom: 8px;
    }
    .dialog-phase-label {
      color: #8888cc;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
    }
    .dialog-speaker {
      color: #ffaa00;
      font-weight: bold;
    }
    .dialog-action {
      color: #00aaff;
      font-size: 11px;
    }
    .dialog-intro {
      color: #cc88ff;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>LLM Debug Console <span>// dungeon-rpg</span></h1>
      <button class="reset" id="btn-reset">Reset Session</button>
    </div>

    <div class="section" id="config-section">
      <div class="section-title">Config</div>
      <div class="config-grid" id="config-grid">
        <span class="label">Loading...</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Pipeline</div>
      <div class="btn-row">
        <button id="btn-arc">Generate Arc</button>
        <button id="btn-lore" disabled>Generate Lore</button>
      </div>
      <div class="btn-row">
        <div class="btn-row-label">Arc Quests</div>
      </div>
      <div class="btn-row" id="quest-buttons"></div>
      <div class="btn-row" id="eval-buttons"></div>
      <div class="btn-row">
        <div class="btn-row-label">Standalone</div>
      </div>
      <div class="standalone-row">
        <select id="npc-select"></select>
        <select id="tier-select">
          <option value="1">Tier 1</option>
          <option value="2">Tier 2</option>
          <option value="3">Tier 3</option>
        </select>
        <button id="btn-standalone">Generate</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Output Log</div>
      <div id="output">
        <div class="empty-state">No calls yet. Generate an arc to begin.</div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/debug.ts"></script>
</body>
</html>
